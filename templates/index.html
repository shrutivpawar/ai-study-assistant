<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AI Study Assistant</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: Arial, sans-serif; max-width:800px; margin:30px auto; padding:0 16px;}
    textarea{width:100%;height:180px}
    button{padding:8px 14px;margin:6px}
    pre{background:#f7f7f7;padding:12px;border-radius:6px}
  </style>
</head>
<body>
  <h1>AI Study Assistant</h1>

  <label for="inputText">Paste notes or text here:</label>
  <textarea id="inputText" placeholder="Paste textbook paragraph, lecture notes, or your own writing..."></textarea>

  <div>
    <button id="btnSumm">Summarize</button>
    <button id="btnExplain">Explain (simple)</button>
    <button id="btnQuiz">Generate Quiz</button>
  </div>

  <h3>Output</h3>
  <div id="output"></div>

  <script src="/static/main.js"></script>
</body>
</html>
